services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: always
    ports:
      - "8201:8200"
    environment:
      # We define everything here so we don't need the config file
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}}, "listener": [{"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}], "ui": true}'
    volumes:
      - ./data:/vault/file
    cap_add:
      - IPC_LOCK
    command: server
    networks:
      - monitoring

networks:
  monitoring:
    external: true
